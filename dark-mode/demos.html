<!--
    TECHNICAL DEMOS PAGE
    =====================
    To add, remove, or edit demo cards, update the `demoData` array in the <script>
    block near the bottom of this file. Each entry supports the following fields:

        name        — The title of the demo card
        category    — Short label shown above the title (e.g. "Automation", "DevOps")
        description — A sentence or two describing the project
        stack       — Array of technology badges shown at the bottom of the card
        link        — URL the card links to when clicked (opens in a new tab)
                      Leave as an empty string ("") to make the card non-clickable
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Demos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--surface:#131316;--card:#18181d;--card2:#1e1e25;
  --border:#28282f;--border2:#33333c;
  --t1:#f0eeea;--t2:#95949e;--t3:#52515a;
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,.13);--gold-glow:rgba(201,168,76,.22);
  --red:#e05c5c;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
body.light{--bg:#f4f3f0;--surface:#eae9e6;--card:#ffffff;--card2:#f0eff0;--border:#dddcda;--border2:#cccac7;--t1:#0f0f12;--t2:#5a5963;--t3:#a09fa8;--gold:#9a6f1e;--gold-dim:rgba(154,111,30,.1);--gold-glow:rgba(154,111,30,.2)}

.theme-toggle{position:fixed;top:16px;right:20px;z-index:200;width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.theme-toggle:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}

.page{max-width:800px;margin:0 auto;padding:52px 40px}

.page-header{margin-bottom:52px;position:relative}
.page-header::after{content:'';position:absolute;bottom:-20px;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.back-link{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t2);text-decoration:none;transition:color .2s}
.back-link:hover{color:var(--gold)}
.back-link svg{transition:transform .2s}
.back-link:hover svg{transform:translateX(-3px)}

.hero{margin-bottom:48px}
.hero-eye{display:flex;align-items:center;gap:10px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.17em;color:var(--gold);margin-bottom:10px}
.hero-eye::before{content:'';width:24px;height:1px;background:var(--gold)}
.hero-wrap{position:relative;display:inline-block}
.hero-ghost{position:absolute;top:3px;left:3px;font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,6vw,5rem);line-height:.92;letter-spacing:.03em;color:transparent;-webkit-text-stroke:1px rgba(201,168,76,.1);pointer-events:none}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,6vw,5rem);line-height:.92;letter-spacing:.03em;color:var(--t1)}
.hero-sub{margin-top:16px;font-size:.9rem;font-weight:300;color:var(--t2);display:flex;align-items:center;max-width:520px;line-height:1.6}
.hero-line{display:inline-block;width:36px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-right:12px;flex-shrink:0}

.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:24px}
.sec-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold);opacity:.7}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;color:var(--t1)}
.sec-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}

.demo-list{display:flex;flex-direction:column;gap:12px}

.demo-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:2px;padding:26px 28px 22px;overflow:hidden;transition:all .2s;text-decoration:none;color:inherit;display:block}
.demo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent 60%);opacity:0;transition:opacity .2s}
.demo-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .3s ease}
.demo-card:hover{background:var(--card2);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.demo-card:hover::before{opacity:1}
.demo-card:hover::after{width:100%}

.demo-tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);margin-bottom:8px;display:block}
.demo-name{font-size:1.05rem;font-weight:600;color:var(--t1);letter-spacing:-.01em;margin-bottom:8px}
.demo-desc{font-size:.86rem;font-weight:300;color:var(--t2);line-height:1.75}
.demo-footer{margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.demo-stack{display:flex;gap:7px;flex-wrap:wrap}
.tech-badge{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--t3);background:transparent;border:1px solid var(--border2);padding:2px 9px;border-radius:2px;letter-spacing:.04em;transition:all .2s}
.demo-card:hover .tech-badge{border-color:rgba(201,168,76,.2);color:var(--t2)}
.link-arrow{font-size:.8rem;color:var(--t3);opacity:0;transform:translateX(-4px);transition:all .2s;flex-shrink:0}
.demo-card:hover .link-arrow{opacity:1;transform:translateX(0);color:var(--gold)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.au{animation:fadeUp .5s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.19s}.d4{animation-delay:.26s}.d5{animation-delay:.33s}.d6{animation-delay:.4s}

@media(max-width:600px){.page{padding:32px 20px}}
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle">🌙</button>

<div class="page">

  <div class="page-header au d1">
    <a href="index.html" class="back-link">
      <svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Resume
    </a>
  </div>

  <div class="hero au d2">
    <div class="hero-eye">Portfolio</div>
    <div class="hero-wrap">
      <div class="hero-ghost">Technical Demos</div>
      <h1 class="hero-name">Technical Demos</h1>
    </div>
    <p class="hero-sub"><span class="hero-line"></span>Prototypes, workflow automations, and lab environments built to solve operational challenges.</p>
  </div>

  <div class="sec-head au d3">
    <span class="sec-num">01</span>
    <h2 class="sec-title">Projects</h2>
    <div class="sec-rule"></div>
  </div>

  <div class="demo-list" id="demo-list"></div>

</div>

<script>
const demoData = [
  {
    name: "Okta Workflow Bot V4",
    category: "Automation",
    description: "A Python-based automation that monitors Okta logs for suspicious API calls and triggers Slack alerts with one-click remediation buttons for the Security team.",
    stack: ["Python", "Okta API", "AWS Lambda"],
    link: "https://www.google.com"
  },
  {
    name: "Live Data Parser Prototype",
    category: "Technical",
    description: "A React-based utility that parses raw JSON infrastructure exports into readable CSV/Excel formats for executive cost-reporting and compliance audits.",
    stack: ["React", "Node.js", "Tailwind"],
    link: "https://www.google.com"
  },
  {
    name: "CI/CD Pipeline Visualizer",
    category: "DevOps",
    description: "Real-time dashboard visualizer for Terraform deployments across multiple AWS environments, showing build status and infrastructure drift detection.",
    stack: ["Terraform", "GitHub Actions", "Webhooks"],
    link: "https://www.google.com"
  },
  {
    name: "Fleet Compliance Audit Tool",
    category: "Management",
    description: "Automated hardware lifecycle tracking tool that cross-references Jamf Pro data with procurement records to identify aging assets and non-compliant devices.",
    stack: ["Jamf API", "SQL", "Google Apps Script"],
    link: "https://www.google.com"
  }
];

const list = document.getElementById('demo-list');
const delays = ['d4','d4','d5','d5','d6','d6'];

demoData.forEach((demo, i) => {
  const el = document.createElement(demo.link ? 'a' : 'div');
  el.className = `demo-card au ${delays[i] || 'd6'}`;
  if (demo.link) { el.href = demo.link; el.target = '_blank'; el.rel = 'noopener noreferrer'; }

  const badges = demo.stack.map(t => `<span class="tech-badge">${t}</span>`).join('');
  const arrow  = demo.link ? `<span class="link-arrow">↗</span>` : '';

  el.innerHTML = `
    <span class="demo-tag">${demo.category}</span>
    <div class="demo-name">${demo.name}</div>
    <div class="demo-desc">${demo.description}</div>
    <div class="demo-footer"><div class="demo-stack">${badges}</div>${arrow}</div>`;

  list.appendChild(el);
});

const toggleBtn = document.getElementById('theme-toggle');
let isLight = false;
toggleBtn.addEventListener('click', () => {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  toggleBtn.textContent = isLight ? '🌙' : '☀️';
});
</script>
</body>
</html>
